name: Publish to PyPI

# Publishes the `nyora` package to PyPI on a version tag (or manual dispatch),
# using PyPI Trusted Publishing (OIDC) — no API token or password stored.
# PyPI must have a trusted publisher configured for:
#   owner: Hasan72341 · repo: nyora-python · workflow: publish.yml · environment: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
